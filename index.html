<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الأصول الشامل - Samcrete</title>
    
    <!-- Chart.js للرسوم البيانية -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- XLSX لقراءة ملفات Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- JS Barcode لطباعة الباركود -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
        }
        
        /* الهيدر مع اللوجو */
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border-radius: 25px;
            padding: 20px 30px;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .header h1 {
            color: white;
            font-size: 1.8em;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .samcrete-logo {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 320px;
            height: 90px;
            overflow: hidden;
        }
        
        .samcrete-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        
        .samcrete-logo i {
            font-size: 2em;
        }
        
        .logo-text h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #fff, #e0e7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .logo-text p {
            color: rgba(255,255,255,0.8);
            font-size: 1em;
        }
        
        /* شريط الأدوات */
        .toolbar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16,185,129,0.3);
        }
        
        .add-btn {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30,60,114,0.3);
        }
        
        .save-btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245,158,11,0.3);
        }
        
        .export-btn {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139,92,246,0.3);
        }
        
        /* شريط الفلاتر */
        .filters-bar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1e3c72;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .filter-label i {
            font-size: 1.2em;
        }
        
        .filter-select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e7ff;
            border-radius: 12px;
            font-size: 1em;
            color: #333;
            background: #f8faff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-select:hover {
            border-color: #1e3c72;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 0 3px rgba(30,60,114,0.1);
        }
        
        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e7ff;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 0 3px rgba(30,60,114,0.1);
        }
        
        .clear-filters {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .clear-filters:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        
        .lang-toggle {
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 5px;
            display: inline-flex;
        }
        
        .lang-option {
            padding: 10px 25px;
            border: none;
            background: transparent;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .lang-option.active {
            background: white;
            color: #1e3c72;
        }
        
        /* بطاقات KPI */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .kpi-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .kpi-card:hover {
            transform: translateY(-5px);
        }
        
        .kpi-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #1e3c72, #2a5298);
        }
        
        .kpi-icon {
            font-size: 2.5em;
            color: #1e3c72;
            margin-bottom: 15px;
        }
        
        .kpi-title {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .kpi-value {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }
        
        .kpi-sub {
            color: #10b981;
            font-size: 1.1em;
            margin-top: 10px;
        }
        
        /* تصنيفات الأجهزة */
        .categories-wrapper {
            background: white;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            overflow-x: auto;
        }
        
        .categories-grid {
            display: flex;
            flex-wrap: nowrap;
            gap: 15px;
            min-width: min-content;
        }
        
        .category-card {
            flex: 0 0 auto;
            width: 160px;
            background: linear-gradient(145deg, #ffffff, #f5f7ff);
            border-radius: 20px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        
        .category-card.active {
            border-color: #1e3c72;
            background: linear-gradient(145deg, #e8efff, #d9e4ff);
        }
        
        .category-icon {
            font-size: 2.5em;
            color: #1e3c72;
            margin-bottom: 8px;
        }
        
        .category-name {
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
            margin-bottom: 8px;
            white-space: nowrap;
        }
        
        .category-count {
            font-size: 1.8em;
            font-weight: bold;
            color: #1e3c72;
            line-height: 1.2;
        }
        
        /* الرسوم البيانية */
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .chart-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        
        .chart-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eef2f6;
        }
        
        .chart-title i {
            color: #1e3c72;
            margin-left: 10px;
        }
        
        canvas {
            max-height: 350px;
            width: 100% !important;
        }
        
        /* جدول البيانات الرئيسي */
        .data-table-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .table-title {
            font-size: 1.4em;
            color: #1e3c72;
            font-weight: 600;
        }
        
        .active-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-badge {
            background: #1e3c72;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-badge i {
            cursor: pointer;
        }
        
        .filter-badge i:hover {
            opacity: 0.8;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 15px;
            font-weight: 500;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .data-table td {
            padding: 12px;
            border-bottom: 1px solid #eef2f6;
        }
        
        .data-table tr:hover {
            background: #f0f7ff;
        }
        
        .edit-input {
            width: 100%;
            padding: 8px;
            border: 2px solid #e0e7ff;
            border-radius: 8px;
            font-size: 0.95em;
        }
        
        .edit-select {
            width: 100%;
            padding: 8px;
            border: 2px solid #e0e7ff;
            border-radius: 8px;
            background: white;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        .btn-edit {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-edit:hover {
            background: #d97706;
        }
        
        .btn-save {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-save:hover {
            background: #059669;
        }
        
        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-delete:hover {
            background: #dc2626;
        }
        
        .btn-barcode {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-barcode:hover {
            background: #6d28d9;
        }
        
        .status-badge {
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9em;
            font-weight: 500;
            display: inline-block;
        }
        
        .status-good {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-maintenance {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .status-outdated {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-not-checked {
            background: #e2e3e5;
            color: #383d41;
        }
        
        /* نافذة إضافة جهاز جديد */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eef2f6;
        }
        
        .modal-header h2 {
            color: #1e3c72;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #666;
        }
        
        .modal-close:hover {
            color: #333;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        .form-label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }
        
        .form-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e7ff;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #1e3c72;
        }
        
        .form-select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e7ff;
            border-radius: 8px;
            background: white;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #eef2f6;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #333;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* رسائل التنبيه */
        .alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 2000;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                top: -100px;
                opacity: 0;
            }
            to {
                top: 20px;
                opacity: 1;
            }
        }
        
        .alert-success {
            background: #10b981;
        }
        
        .alert-error {
            background: #ef4444;
        }
        
        .alert-info {
            background: #3b82f6;
        }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-top: 30px;
            font-size: 1.1em;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .page-btn {
            padding: 8px 15px;
            border: 1px solid #e0e7ff;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .page-btn:hover {
            background: #f0f7ff;
            border-color: #1e3c72;
        }
        
        .page-btn.active {
            background: #1e3c72;
            color: white;
            border-color: #1e3c72;
        }
        
        body[dir="ltr"] {
            text-align: left;
        }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-box {
            background: #f8faff;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-box-title {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .stat-box-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #1e3c72;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            background: #f8faff;
            border-radius: 15px;
            color: #666;
        }
        
        .no-results i {
            font-size: 4em;
            color: #1e3c72;
            margin-bottom: 15px;
        }
        
        @media (max-width: 768px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .charts-row {
                grid-template-columns: 1fr;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <div class="logo-container">
                <div class="samcrete-logo">
                    <img id="logoImage" src="samcrete-logo.png" alt="Samcrete Logo" />
                </div>
            </div>
            <div class="logo-text" style="flex: 1;">
                <h1 id="mainTitle">نظام إدارة الأصول الشامل</h1>
                <p id="subTitle"><i class="fas fa-building"></i> Samcrete Egypt - إدارة ومتابعة الأصول</p>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div class="lang-toggle">
                    <button class="lang-option active" data-lang="ar">🇪🇬 العربية</button>
                    <button class="lang-option" data-lang="en">🇬🇧 English</button>
                </div>
            </div>
        </div>

        <!-- شريط الأدوات -->
        <div class="toolbar">
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-upload"></i>
                <span id="uploadBtnText">تحميل ملف Excel</span>
            </button>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display: none;" onchange="handleFileUpload(this)">
            
            <button class="add-btn" onclick="document.getElementById('csvImportInput').click()">
                <i class="fas fa-file-csv"></i>
                <span>استيراد CSV</span>
            </button>
            <input type="file" id="csvImportInput" accept=".csv" style="display: none;" onchange="importFromCSV(this)">
            
            <button class="add-btn" onclick="showColumnMapper()">
                <i class="fas fa-columns"></i>
                <span id="addColumnBtnText">إضافة عمود</span>
            </button>
            
            <button class="add-btn" onclick="showColumnSettings()" style="background: linear-gradient(135deg, #7c3aed, #4f46e5);">
                <i class="fas fa-list"></i>
                <span id="manageColumnsBtnText">إدارة الأعمدة</span>
            </button>
            
            <button class="add-btn" onclick="showOnlineSheetModal()" style="background: linear-gradient(135deg, #06b6d4, #0891b2);">
                <i class="fas fa-cloud"></i>

        function getColumnLabel(key) {
            if (key === '__actions') return translations[currentLang].actions;
            return (columnKeyLabels[key] && columnKeyLabels[key][currentLang]) || key;
        }

        function switchLanguage(lang) {
            currentLang = lang;
            document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            updateUI();
        }

        function saveAppState() {
            localStorage.setItem('dashboardFilters', JSON.stringify(currentFilters));
        }

        function loadAppState() {
            const saved = localStorage.getItem('dashboardFilters');
            if (!saved) return;

            let parsed;
            try {
                parsed = JSON.parse(saved);
            } catch (e) {
                console.warn('بيانات الحالة المحفوظة تالفة، سيتم إعادة تعيينها', e);
                localStorage.removeItem('dashboardFilters');
                return;
            }

            // ترحيل حالة سابقة حيث تم حفظ الأصول داخل dashboardFilters
            // (نقوم بنقل الأصول إلى assetsData مع الحفاظ على الفلاتر)
            if (parsed && typeof parsed === 'object' && parsed.assetsData) {
                console.log('تم العثور على بيانات أصول محفوظة داخل dashboardFilters؛ سيتم ترحيلها إلى assetsData');
                localStorage.setItem('assetsData', JSON.stringify(parsed.assetsData));

                // احتفظ بالفلاتر وأزل الحقول الأخرى
                delete parsed.assetsData;
                delete parsed.availableColumns;
                delete parsed.visibleColumns;
                delete parsed.extraColumns;
                delete parsed.onlineSheets;

                localStorage.setItem('dashboardFilters', JSON.stringify(parsed));
                // لا نعيد return هنا حتى يتم تطبيق الفلاتر المترحلة
            }

            const expectedKeys = ['location', 'device', 'status', 'check', 'search', 'lang', 'barChartField', 'barChartSubField', 'pieChartField', 'categorySubField'];
            const isValid = parsed && typeof parsed === 'object' && expectedKeys.every(k => k in parsed);
            if (!isValid) {
                console.warn('البيانات المحفوظة فارغة أو غير صالحة، سيتم إعادة تعيين الفلاتر');
                localStorage.removeItem('dashboardFilters');
                return;
            }

            currentFilters = parsed;

            // تطبيق الفلاتر إذا كانت العناصر موجودة
            const locationFilter = document.getElementById('locationFilter');
            if (locationFilter) locationFilter.value = currentFilters.location;
            const deviceFilter = document.getElementById('deviceFilter');
            if (deviceFilter) deviceFilter.value = currentFilters.device;
            const statusFilter = document.getElementById('statusFilter');
            if (statusFilter) statusFilter.value = currentFilters.status;
            const checkFilter = document.getElementById('checkFilter');
            if (checkFilter) checkFilter.value = currentFilters.check;
            const searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.value = currentFilters.search;
            // الرسوم البيانية
            const barChartField = document.getElementById('barChartField');
            if (barChartField) barChartField.value = currentFilters.barChartField;
            const barChartSubField = document.getElementById('barChartSubField');
            if (barChartSubField) barChartSubField.value = currentFilters.barChartSubField;
            const pieChartField = document.getElementById('pieChartField');
            if (pieChartField) pieChartField.value = currentFilters.pieChartField;
            const categorySubField = document.getElementById('categorySubField');
            if (categorySubField) categorySubField.value = currentFilters.categorySubField;

            // عدد الصفوف في الصفحة
            const rowsPerPageSelect = document.getElementById('rowsPerPageSelect');
            if (rowsPerPageSelect) {
                rowsPerPage = currentFilters.rowsPerPage || rowsPerPage;
                rowsPerPageSelect.value = rowsPerPage;
            }

            // اللغة
            if (currentFilters.lang !== currentLang) {
                switchLanguage(currentFilters.lang);
            }
        }

        function refreshAvailableColumns() {
            if (!Array.isArray(assetsData)) {
                console.error('assetsData is not an array:', assetsData);
                assetsData = [];
            }
            const allKeys = new Set();
            assetsData.forEach(asset => Object.keys(asset).forEach(k => allKeys.add(k)));
            availableColumns = Array.from(allKeys);
        }

        function initVisibleColumns() {
            if (visibleColumns.length === 0) {
                visibleColumns = [
                    'Location',
                    'Location Description',
                    'Full Name',
                    'Asset Type',
                    'Asset Description',
                    'S/N',
                    'Status',
                    'Check status',
                    '__actions'
                ];
            }

            // Ensure all visible columns exist in availableColumns
            visibleColumns = visibleColumns.filter(c => c === '__actions' || availableColumns.includes(c));
        }

        // ==================== تهيئة البيانات من الملف ====================
        async function initializeData() {
            try {
                // محاولة تحميل البيانات من localStorage
                let savedData = localStorage.getItem('assetsData');

                // إذا كانت البيانات محفوظة خطأً تحت dashboardFilters (بسبب نسخة أقدم من التطبيق)، نقوم بترحيلها
                if (!savedData) {
                    const dashboardFiltersRaw = localStorage.getItem('dashboardFilters');
                    if (dashboardFiltersRaw) {
                        try {
                            const parsedFilters = JSON.parse(dashboardFiltersRaw);
                            if (parsedFilters && parsedFilters.assetsData) {
                                console.log('ترحيل بيانات الأصول المحفوظة من dashboardFilters إلى assetsData');
                                localStorage.setItem('assetsData', JSON.stringify(parsedFilters.assetsData));
                                delete parsedFilters.assetsData;
                                delete parsedFilters.availableColumns;
                                delete parsedFilters.visibleColumns;
                                delete parsedFilters.extraColumns;
                                delete parsedFilters.onlineSheets;
                                localStorage.setItem('dashboardFilters', JSON.stringify(parsedFilters));
                                savedData = localStorage.getItem('assetsData');
                            }
                        } catch (e) {
                            console.warn('فشل ترحيل بيانات dashboardFilters:', e);
                        }
                    }
                }

                if (savedData) {
                    try {
                        const parsedData = JSON.parse(savedData);
                        console.log('البيانات المحفوظة:', parsedData);
                        
                        // التحقق من نوع البيانات المحفوظة
                        let extractedAssetsData = null;
                        if (Array.isArray(parsedData)) {
                            // البيانات محفوظة كمصفوفة مباشرة
                            extractedAssetsData = parsedData;
                        } else if (parsedData && typeof parsedData === 'object' && parsedData.assetsData) {
                            // البيانات محفوظة ككائن يحتوي على assetsData
                            extractedAssetsData = parsedData.assetsData;
                        }
                        
                        if (Array.isArray(extractedAssetsData) && extractedAssetsData.length > 0) {
                            assetsData = extractedAssetsData;
                            console.log('تم تحميل البيانات من localStorage');
                        } else {
                            console.error('البيانات المحفوظة فارغة أو غير صحيحة، سيتم مسحها واستخدام صفحة فارغة');
                            localStorage.removeItem('assetsData');
                            assetsData = [];
                        }
                    } catch (e) {
                        console.error('خطأ في تحليل البيانات المحفوظة، سيتم مسحها واستخدام صفحة فارغة');

        function applyFilter() {
            const location = document.getElementById('locationFilter').value;
            const device = document.getElementById('deviceFilter').value;
            const status = document.getElementById('statusFilter').value;
            const check = document.getElementById('checkFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            // حفظ الحالة
            currentFilters.location = location;
            currentFilters.device = device;
            currentFilters.status = status;
            currentFilters.check = check;
            currentFilters.search = document.getElementById('searchInput').value;
            saveAppState();
            
            filteredData = assetsData.filter(asset => {
                if (location !== 'all' && asset.Location !== location) return false;
                if (device !== 'all' && asset['Asset Type'] !== device) return false;
                if (status !== 'all' && asset.Status !== status) return false;
                if (check !== 'all' && asset['Check status'] !== check) return false;
                
                if (search) {
                    const searchable = `${asset['Full Name'] || ''} ${asset['S/N'] || ''} ${asset['Asset Description'] || ''}`.toLowerCase();
                    if (!searchable.includes(search)) return false;
                }
                
                return true;
            });
            
            currentPage = 1;
            updateUI();
        }

        function updateCategories() {
            // دعم التصنيف الثنائي: نوع الجهاز × حالة الفحص أو الحالة
            const subField = document.getElementById('categorySubField')?.value || 'Check status';
            // حفظ الحالة
            currentFilters.categorySubField = subField;
            saveAppState();
            const deviceMap = {};
            filteredData.forEach(asset => {
                const type = asset['Asset Type'] || 'غير محدد';
                const sub = asset[subField] || 'غير محدد';
                if (!deviceMap[type]) deviceMap[type] = {};
                deviceMap[type][sub] = (deviceMap[type][sub] || 0) + 1;
            });
            // إجمالي لكل نوع
            const sortedDevices = Object.entries(deviceMap)
                .map(([type, subs]) => [type, Object.values(subs).reduce((a,b)=>a+b,0), subs])
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);
            // جمع كل القيم الفرعية
            const allSubs = Array.from(new Set(filteredData.map(a => a[subField] || 'غير محدد')));
            document.getElementById('categoriesGrid').innerHTML = sortedDevices.map(([type, total, subs]) => {
                const icon = getDeviceIcon(type);
                // عرض عددين فقط إذا كان التصنيف الفرعي هو حالة الفحص (Checked/Not Checked)

                if (subField === 'Check status') {
                    const checked = subs['Checked'] || 0;
                    const notChecked = subs['Not Checked'] || 0;
                    subCountsHtml = `<div style='font-size:0.95em;margin-top:4px;'><span style='color:#10b981;font-weight:bold;'>✔️ ${checked}</span> / <span style='color:#ef4444;font-weight:bold;'>❌ ${notChecked}</span></div>`;
                } else {
                    subCountsHtml = allSubs.map(sub => `<span style='font-size:0.9em;margin:0 2px;'>${sub}: <b>${subs[sub]||0}</b></span>`).join(' ');
                }
                return `
                    <div class="category-card" onclick="filterByDevice('${type}')">
                        <div class="category-icon"><i class="fas ${icon}"></i></div>
                        <div class="category-name">${type}</div>

        // ==================== تحديث الجدول ====================
        function updateTable() {
            const t = translations[currentLang];
            const start = (currentPage - 1) * rowsPerPage;
            const pageData = rowsPerPage === 0 ? filteredData : filteredData.slice(start, start + rowsPerPage);

            // تحديث رأس الجدول حسب الأعمدة المفعلة
            const headers = visibleColumns.map(col => getColumnLabel(col));
            document.getElementById('tableHeader').innerHTML = headers.map(h => `<th>${h}</th>`).join('');

            // تحديث جسم الجدول
            document.getElementById('tableBody').innerHTML = pageData.map((asset, index) => {
                const rowIndex = start + index + 1;
                const statusClass = getStatusClass(asset.Status);

                const rowCells = visibleColumns.map(col => {
                    if (col === '__actions') {
                        return `
                            <td>
                                <div class="action-buttons">
                                    <button class="btn-edit" onclick="editAsset(${asset.id})" title="${t.edit}"><i class="fas fa-edit"></i></button>
                                    <button class="btn-barcode" onclick="printBarcode(${asset.id})" title="${t.barcode}"><i class="fas fa-barcode"></i></button>
                                    <button class="btn-delete" onclick="deleteAsset(${asset.id})" title="${t.delete}"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>
                        `;
                    }

                    let value = asset[col];
                    if (col === 'Status') {
                        value = `<span class="status-badge ${statusClass}">${value || '-'}</span>`;
                    } else if (col === 'Check status') {
                        const cls = value === 'Checked' ? 'status-good' : 'status-not-checked';
                        value = `<span class="status-badge ${cls}">${value || '-'}</span>`;
                    } else {
                        value = value || '-';
                    }

                    return `<td>${value}</td>`;
                }).join('');

                return `
                    <tr>
                        ${rowCells}
                    </tr>
                `;
            }).join('');

            // تحديث الترقيم
            updatePagination();
        }

        function getStatusClass(status) {
            if (!status) return 'status-not-checked';
            if (status.includes('Good')) return 'status-good';
            if (status.includes('Needs maintenance')) return 'status-maintenance';
            if (status.includes('Outdated')) return 'status-outdated';
            return 'status-not-checked';
        }

        function updatePagination() {
            const paginationEl = document.getElementById('pagination');
            if (rowsPerPage === 0) {
                paginationEl.innerHTML = '';
                return;
            }
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            if (totalPages <= 1) {
                paginationEl.innerHTML = '';
                return;
            }

            const maxButtons = 7; // أعلى عدد من الأرقام المرئية
            const showRange = (page, total, max) => {
                const half = Math.floor(max / 2);
                let start = Math.max(1, page - half);
                let end = Math.min(total, page + half);
                if (end - start + 1 < max) {
                    if (start === 1) {
                        end = Math.min(total, start + max - 1);
                    } else if (end === total) {
                        start = Math.max(1, end - max + 1);
                    }
                }
                return { start, end };
            };

            const { start, end } = showRange(currentPage, totalPages, maxButtons);
            let html = '';

            const addButton = (page, label, extraClass = '') => {
                html += `<button class="page-btn ${page === currentPage ? 'active' : ''} ${extraClass}" onclick="goToPage(${page})">${label}</button>`;
            };

            // Previous
            if (currentPage > 1) {
                addButton(currentPage - 1, '◀');
            }

            if (start > 1) {
                addButton(1, '1');
                if (start > 2) html += `<span class="ellipsis">…</span>`;
            }

            for (let i = start; i <= end; i++) {
                addButton(i, i);
            }

            if (end < totalPages) {
                if (end < totalPages - 1) html += `<span class="ellipsis">…</span>`;
                addButton(totalPages, totalPages);
            }

            // Next
            if (currentPage < totalPages) {
                addButton(currentPage + 1, '▶');
            }

            paginationEl.innerHTML = html;
        }

        function goToPage(page) {
            const totalPages = rowsPerPage === 0 ? 1 : Math.ceil(filteredData.length / rowsPerPage);
            if (page < 1) page = 1;
            if (page > totalPages) page = totalPages;
            currentPage = page;
            updateTable();
        }

        function changeRowsPerPage(value) {
            const parsed = parseInt(value, 10);
            rowsPerPage = Number.isNaN(parsed) ? 20 : parsed;
            currentFilters.rowsPerPage = rowsPerPage;
            currentPage = 1;
            saveAppState();
            updateTable();
        }

        // ==================== تحديث الرسوم البيانية ====================
        function updateCharts() {
            // تدمير الرسوم البيانية السابقة إذا وجدت
            if (window.barChart) window.barChart.destroy();
            if (window.pieChart) window.pieChart.destroy();
            // دعم التصنيف الثنائي
            const barField = document.getElementById('barChartField')?.value || 'Location';
            const pieField = document.getElementById('pieChartField')?.value || 'Asset Type';
            const barSubField = document.getElementById('barChartSubField')?.value || 'Check status';
            // حفظ الحالة
            currentFilters.barChartField = barField;
            currentFilters.barChartSubField = barSubField;
            currentFilters.pieChartField = pieField;
            saveAppState();
            // بيانات الرسم العمودي ثنائي التصنيف
            let barData = {};
            let barSubKeys = [];
            if (document.getElementById('barChartSubField')) {
                // ثنائي التصنيف
                filteredData.forEach(asset => {
                    const key = asset[barField] || 'غير محدد';
                    const sub = asset[barSubField] || 'غير محدد';
                    if (!barData[key]) barData[key] = {};
                    barData[key][sub] = (barData[key][sub] || 0) + 1;
                });
                barSubKeys = Array.from(new Set(filteredData.map(a => a[barSubField] || 'غير محدد')));
            } else {
                // تصنيف واحد
                filteredData.forEach(asset => {
                    const key = asset[barField] || 'غير محدد';
                    barData[key] = (barData[key] || 0) + 1;
                });
            }
            const barCtx = document.getElementById('mainBarChart').getContext('2d');
            if (document.getElementById('barChartSubField')) {
                // رسم ثنائي التصنيف
                window.barChart = new Chart(barCtx, {
                    type: 'bar',
                    data: {
                        labels: Object.keys(barData),
                        datasets: barSubKeys.map((sub, i) => ({
                            label: sub,
                            data: Object.keys(barData).map(k => barData[k][sub] || 0),
                            backgroundColor: ['#1e3c72', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#6b7280'][i % 9],
                            borderWidth: 1
                        }))
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'top' },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return `${context.dataset.label}: ${context.parsed.y} جهاز`;
                                    }
                                }
                            }
                        },
                        onClick: function(evt, elements) {
                            if (elements.length > 0) {
                                const idx = elements[0].index;
                                const datasetIdx = elements[0].datasetIndex;
                                const label = this.data.labels[idx];
                                const sub = this.data.datasets[datasetIdx].label;
                                const details = filteredData.filter(asset => (asset[barField] || 'غير محدد') === label && (asset[barSubField] || 'غير محدد') === sub);
                                showChartDetails(`${label} - ${sub}`, details);
                            }
                        },
                        scales: {
                            y: { beginAtZero: true, ticks: { stepSize: 1 } }
                        }
                    }
                });
            } else {
                // رسم تصنيف واحد
                window.barChart = new Chart(barCtx, {
                    type: 'bar',
                    data: {
                        labels: Object.keys(barData),
                        datasets: [{
                            label: 'عدد الأجهزة',
                            data: Object.values(barData),
                            backgroundColor: '#1e3c72',
                            borderColor: '#2a5298',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return `${context.label}: ${context.parsed.y} جهاز`;
                                    }
                                }
                            }
                        },
                        onClick: function(evt, elements) {
                            if (elements.length > 0) {
                                const idx = elements[0].index;
                                const label = this.data.labels[idx];
                                const details = filteredData.filter(asset => (asset[barField] || 'غير محدد') === label);
                                showChartDetails(label, details);
                            }
                        },
                        scales: {
                            y: { beginAtZero: true, ticks: { stepSize: 1 } }
                        }
                    }
                });
            }
            // بيانات الرسم الدائري
            const pieData = {};
            filteredData.forEach(asset => {
                const key = asset[pieField] || 'غير محدد';
                pieData[key] = (pieData[key] || 0) + 1;
            });
            const colors = ['#1e3c72', '#2a5298', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#6b7280'];
            const pieCtx = document.getElementById('devicePieChart').getContext('2d');
            window.pieChart = new Chart(pieCtx, {
                type: 'pie',
                data: {
                    labels: Object.keys(pieData),
                    datasets: [{
                        data: Object.values(pieData),
                        backgroundColor: colors.slice(0, Object.keys(pieData).length)
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: {
                            callbacks: {
                                label: function(context) {

                                }

                            const idx = elements[0].index;
                            const label = this.data.labels[idx];

        // نافذة تفاصيل التصنيف
        function showChartDetails(label, details) {
            let html = `<div style='padding:16px;max-height:400px;overflow:auto;direction:rtl;'>`;
            html += `<h3 style='margin-bottom:10px;'>${label} - عدد: ${details.length}</h3>`;
            html += `<table border='1' style='width:100%;border-collapse:collapse;'>`;
            html += `<tr>`;
            Object.keys(details[0]||{}).forEach(k=>{html+=`<th>${k}</th>`});
            html += `</tr>`;
            details.forEach(row=>{
                html += `<tr>`;
                Object.values(row).forEach(v=>{html+=`<td>${v}</td>`});
                html += `</tr>`;
            });
            html += `</table></div>`;
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100vw';
            modal.style.height = '100vh';

        function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    let allData = [];
                    let idCounter = assetsData.length + 1;
                    
                    // قراءة جميع الشيتات
                    workbook.SheetNames.forEach(sheetName => {
                        const worksheet = workbook.Sheets[sheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet);
                        
                        if (jsonData.length > 0) {
                            const newData = jsonData.map((row) => ({
                                id: idCounter++,
                                ...row
                            }));
                            allData = [...allData, ...newData];
                        }
                    });
                    
                    if (allData.length > 0) {
                        assetsData = [...assetsData, ...allData];
                        console.log('البيانات بعد التحميل:', assetsData);
                        console.log('نوع البيانات:', typeof assetsData, 'هل مصفوفة:', Array.isArray(assetsData));
                        // حفظ البيانات في localStorage
                        saveToLocalStorage();
                        console.log('تم حفظ البيانات في localStorage');
                        refreshAvailableColumns();
                        initVisibleColumns();
                        filteredData = [...assetsData];
                        populateFilters();
                        updateUI();
                        showAlert(`تم تحميل ${allData.length} سجل من ${workbook.SheetNames.length} شيتات`, 'success');
                    } else {
                        showAlert('لم يتم العثور على بيانات في الملف', 'error');
                    }
                } catch (error) {
                    console.error(error);
                    showAlert('خطأ في قراءة الملف', 'error');
                }
            };
            
            reader.readAsArrayBuffer(file);
            input.value = ''; // إعادة تعيين input
        }

        function saveAsset() {
            // الحصول على القيم
            let location = document.getElementById('modalLocation').value;
            const locationNew = document.getElementById('modalLocationNew').value.trim();
            if (locationNew) {
                location = locationNew;
            }
            
            let assetType = document.getElementById('modalAssetType').value;
            const assetTypeNew = document.getElementById('modalAssetTypeNew').value.trim();
            if (assetTypeNew) {
                assetType = assetTypeNew;
            }
            
            const assetNum = document.getElementById('modalAssetNum').value.trim();
            const assetDesc = document.getElementById('modalAssetDesc').value.trim();
            const sn = document.getElementById('modalSN').value.trim();
            
            // التحقق من الحقول المطلوبة
            if (!location) {
                showAlert('يجب إدخال الموقع', 'error');
                return;
            }
            if (!assetType) {
                showAlert('يجب إدخال نوع الجهاز', 'error');
                return;
            }
            if (!assetNum) {
                showAlert('يجب إدخال رقم الأصل', 'error');
                return;
            }
            if (!assetDesc) {
                showAlert('يجب إدخال وصف الجهاز', 'error');
                return;
            }
            if (!sn) {
                showAlert('يجب إدخال الرقم التسلسلي', 'error');
                return;
            }
            
            // التحقق من عدم تكرار الرقم التسلسلي (إلا في حالة التعديل)
            if (!editingId) {
                const existingSN = assetsData.find(a => a['S/N'] === sn);
                if (existingSN) {
                    showAlert('الرقم التسلسلي موجود بالفعل', 'error');
                    return;
                }
            }
            
            const assetData = {
                Location: location,
                'Location Description': document.getElementById('modalLocationDesc').value,
                'Employee Number': document.getElementById('modalEmpNum').value,
                'Full Name': document.getElementById('modalFullName').value,
                'Asset Number': assetNum,
                'Asset Key': document.getElementById('modalAssetKey').value,
                'Asset Type': assetType,
                'Asset Description': assetDesc,
                'S/N': sn,
                Status: document.getElementById('modalStatus').value,
                Comments: document.getElementById('modalComments').value,
                'QR Code': document.getElementById('modalQR').value,
                'Check status': document.getElementById('modalCheck').value,
                'تعليق المخازن': document.getElementById('modalWarehouse').value
            };
            
            if (editingId) {
                // تعديل جهاز موجود
                const index = assetsData.findIndex(a => a.id === editingId);
                if (index !== -1) {
                    assetsData[index] = { ...assetsData[index], ...assetData };
                }
            } else {
                // إضافة جهاز جديد
                const newId = Math.max(...assetsData.map(a => a.id), 0) + 1;
                assetsData.push({ id: newId, ...assetData });
            }
            
            filteredData = [...assetsData];
            closeModal();
            populateFilters();
            updateUI();
            applyFilter(); // إعادة تطبيق الفلاتر على البيانات المحدثة
            saveToLocalStorage();
            showAlert('تم حفظ البيانات بنجاح', 'success');
        }

        // ==================== تصدير إلى CSV ====================
        function exportToCSV() {
            const headers = Object.keys(filteredData[0] || {});
            const csvContent = [
                headers.join(','),
                ...filteredData.map(row => headers.map(h => `"${(row[h] || '').toString().replace(/"/g, '""')}"`).join(','))
            ].join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `samcrete_assets_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        // ==================== استيراد من CSV ====================
        function importFromCSV(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const csvText = e.target.result;
                const lines = csvText.split('\n').filter(line => line.trim());
                if (lines.length < 2) {
                    showAlert('الملف فارغ أو لا يحتوي على بيانات صحيحة', 'error');
                    return;
                }

                const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').replace(/""/g, '"'));
                const data = lines.slice(1).map(line => {
                    const values = line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').replace(/""/g, '"'));
                    const obj = {};
                    headers.forEach((h, i) => {
                        obj[h] = values[i] || '';
                    });
                    return obj;
                });

                // إضافة معرف فريد لكل جهاز
                const newData = data.map((asset, index) => ({
                    id: Date.now() + index, // معرف فريد
                    ...asset
                }));

                assetsData = [...assetsData, ...newData];
                filteredData = [...assetsData];
                
                populateFilters();
                applyFilter();
                updateUI();
                saveToLocalStorage();
                
                showAlert(`تم استيراد ${newData.length} جهاز من الملف`, 'success');
            };
            reader.readAsText(file, 'UTF-8');
            input.value = ''; // إعادة تعيين الإدخال
        }

                    </div>
                    <script>
                        window.onload = function() {
                            const canvas = document.createElement('canvas');
                            QRCode.toCanvas(canvas, '${qrValue}', {
                                width: 200,
                                height: 200,
                                margin: 2,
                                color: {
                                    dark: "#1e3c72",
                                    light: "#ffffff"
                                },
                                errorCorrectionLevel: 'H'
                            }, function(error) {
                                if (error) {
                                    console.error(error);
                                    return;
                                }
                                document.getElementById('qrcode').appendChild(canvas);
                                setTimeout(() => window.print(), 800);
                            });
                        };
                    <\/script>
                </body>
                </html>
            `;
            printWindow.document.write(htmlContent);
            printWindow.document.close();
        }

        // ==================== دوال مساعدة ====================
        function updateLastUpdate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('lastUpdate').textContent = now.toLocaleDateString('ar-EG', options);
        }

        function showAlert(message, type = 'info') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            document.body.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 3000);
        }

        // ==================== إدارة الأعمدة الإضافية ====================
        function showColumnMapper() {
            document.getElementById('columnMapperModal').classList.add('active');
        }

        function closeColumnMapper() {
            document.getElementById('columnMapperModal').classList.remove('active');
            document.getElementById('newColumnName').value = '';
            document.getElementById('columnType').value = 'text';
            document.getElementById('selectOptions').value = '';
            document.getElementById('selectOptionsGroup').style.display = 'none';
        }

        document.getElementById('columnType')?.addEventListener('change', function() {
            const selectGroup = document.getElementById('selectOptionsGroup');
            selectGroup.style.display = this.value === 'select' ? 'block' : 'none';
        });

        function addNewColumn() {
            const columnName = document.getElementById('newColumnName').value.trim();
            const columnType = document.getElementById('columnType').value;
            const selectOptions = document.getElementById('selectOptions').value.trim();

            if (!columnName) {
                showAlert('يرجى إدخال اسم العمود', 'error');
                return;
            }

            if (columnType === 'select' && !selectOptions) {
                showAlert('يرجى إدخال الخيارات', 'error');
                return;
            }

            const newColumn = {
                name: columnName,
                type: columnType,
                options: columnType === 'select' ? selectOptions.split(',').map(o => o.trim()) : []
            };

            extraColumns.push(newColumn);
            
            // إضافة قيمة فارغة للجميع الأصول
            assetsData.forEach(asset => {
                asset[columnName] = '';
            });

            refreshAvailableColumns();
            initVisibleColumns();
            closeColumnMapper();
            updateUI();
            saveToLocalStorage();
            showAlert(`تم إضافة العمود "${columnName}" بنجاح`, 'success');
        }

        // ==================== إدارة إعدادات الأعمدة ====================
        function showColumnSettings() {
            renderColumnSettings();
            document.getElementById('columnSettingsModal').classList.add('active');
        }

        function closeColumnSettings() {
            document.getElementById('columnSettingsModal').classList.remove('active');
        }

        function renderColumnSettings() {
            const container = document.getElementById('columnSettingsList');
            if (!container) return;

            const allCols = Array.from(new Set([...availableColumns, ...visibleColumns, '__actions']));

            container.innerHTML = allCols.map((col, idx) => {
                const isActions = col === '__actions';
                const label = getColumnLabel(col);
                const checked = isActions || visibleColumns.includes(col);

                return `
                    <div class="column-item" data-col="${col}" style="display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #e5e7eb;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" ${checked ? 'checked' : ''} ${isActions ? 'disabled' : ''} onchange="toggleColumnVisibility('${col}', this.checked)">
                            <span>${label}</span>
                        </div>
                        <div>
                            <button onclick="moveColumn('${col}', -1)" style="margin-right: 6px;">⬆</button>
                            <button onclick="moveColumn('${col}', 1)">⬇</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleColumnVisibility(column, visible) {
            if (!visible) {
                visibleColumns = visibleColumns.filter(c => c !== column);
            } else if (!visibleColumns.includes(column)) {
                visibleColumns.splice(visibleColumns.length - 1, 0, column);
            }
            updateUI();
        }

        function moveColumn(column, direction) {
            const idx = visibleColumns.indexOf(column);
            if (idx === -1) return;
            const newIndex = idx + direction;
            if (newIndex < 0 || newIndex >= visibleColumns.length - 1) return; // لا تحرك آخر العمود
            const temp = visibleColumns[newIndex];
            visibleColumns[newIndex] = visibleColumns[idx];
            visibleColumns[idx] = temp;
            renderColumnSettings();
            updateUI();
        }

        function saveColumnSettings() {
            saveToLocalStorage();
            showAlert('تم حفظ إعدادات الأعمدة', 'success');
            closeColumnSettings();
        }

        // ==================== إدارة الملفات الأونلاين ====================
        function showOnlineSheetModal() {
            displayConnectedSheets();
            document.getElementById('onlineSheetModal').classList.add('active');
        }

        function closeOnlineSheetModal() {
            document.getElementById('onlineSheetModal').classList.remove('active');
            document.getElementById('googleSheetUrl').value = '';
            document.getElementById('sheetName').value = '';
        }

        function displayConnectedSheets() {
            const container = document.getElementById('connectedSheets');
            if (onlineSheets.length === 0) {
                container.innerHTML = '<p style="color: #999;">لا توجد ملفات متصلة</p>';
                return;
            }

            container.innerHTML = onlineSheets.map((sheet, idx) => `
                <div style="padding: 10px; background: #f8faff; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong>${sheet.name}</strong><br>
                        <small style="color: #666;">آخر مزامنة: ${sheet.lastSync ? new Date(sheet.lastSync).toLocaleString('ar-EG') : 'لم يتم'}</small>
                    </div>
                    <button onclick="disconnectSheet(${idx})" style="padding: 5px 10px; background: #ef4444; color: white; border: none; border-radius: 5px; cursor: pointer;">
                        قطع الاتصال
                    </button>
                </div>
            `).join('');
        }

        function connectOnlineSheet() {
            const url = document.getElementById('googleSheetUrl').value.trim();
            const name = document.getElementById('sheetName').value.trim();
            const autoSync = document.getElementById('autoSync').checked;

            if (!url || !name) {
                showAlert('يرجى ملء جميع الحقول', 'error');
                return;
            }

            const newSheet = {
                name: name,
                url: url,
                autoSync: autoSync,
                lastSync: null,
                syncInterval: null
            };

            if (autoSync) {
                // المزامنة كل 5 دقائق (300000 ميلي ثانية)
                newSheet.syncInterval = setInterval(() => {
                    syncOnlineSheet(onlineSheets.indexOf(newSheet));
                }, 300000);
            }

            onlineSheets.push(newSheet);
            closeOnlineSheetModal();
            saveToLocalStorage();
            showAlert(`تم ربط الملف "${name}" بنجاح`, 'success');
        }

        function disconnectSheet(index) {
            if (onlineSheets[index].syncInterval) {
                clearInterval(onlineSheets[index].syncInterval);
            }
            onlineSheets.splice(index, 1);
            displayConnectedSheets();
            saveToLocalStorage();
            showAlert('تم قطع الاتصال بنجاح', 'success');
        }

        async function syncOnlineSheet(index) {
            const sheet = onlineSheets[index];
            showAlert(`جاري مزامنة ${sheet.name}...`, 'info');

            // بناء رابط CSV من رابط Google Sheets (إذا كان موجوداً).
            let csvUrl = sheet.url;
            if (csvUrl.includes('/edit')) {
                csvUrl = csvUrl.split('/edit')[0] + '/export?format=csv';
            } else if (!csvUrl.includes('format=csv')) {
                csvUrl += (csvUrl.includes('?') ? '&' : '?') + 'format=csv';
            }

            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error('فشل تحميل الملف');
                const text = await response.text();

                const rows = text.trim().split(/\r?\n/).map(r => r.split(','));
                const headers = rows.shift();
                const newData = rows.map((row, idx) => {
                    const obj = { id: assetsData.length + idx + 1 };
                    headers.forEach((header, hIdx) => {
                        obj[header.trim()] = row[hIdx] ? row[hIdx].trim() : '';
                    });
                    return obj;
                });

                if (newData.length) {
                    assetsData = [...assetsData, ...newData];
                    refreshAvailableColumns();
                    initVisibleColumns();
                    filteredData = [...assetsData];
                    populateFilters();
                    updateUI();

                    sheet.lastSync = new Date();
                    saveToLocalStorage();
                    showAlert(`تمت المزامنة (${newData.length} سجل)`,'success');
                } else {
                    showAlert('لم يتم العثور على بيانات في الملف المُزامن', 'error');
                }
            } catch (err) {
                console.error(err);
                showAlert('فشل في المزامنة، تحقق من الرابط', 'error');
            }

            displayConnectedSheets();
        }

        // ==================== تحديث الحفظ والتحميل ====================
        function saveToLocalStorage() {
            localStorage.setItem('assetsData', JSON.stringify(assetsData));
            updateLastUpdate();
            showAlert(translations[currentLang].saved, 'success');
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('assetsData');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    assetsData = data.assetsData || [];
                    extraColumns = data.extraColumns || [];
                    availableColumns = data.availableColumns || [];
                    visibleColumns = data.visibleColumns || [];

                    onlineSheets = (data.onlineSheets || []).map(s => ({
                        ...s,
                        syncInterval: s.autoSync ? setInterval(() => {
                            syncOnlineSheet(onlineSheets.indexOf(s));
                        }, 300000) : null
                    }));
                    
                    filteredData = [...assetsData];
                    refreshAvailableColumns();
                    initVisibleColumns();
                    populateFilters();
                    updateUI();
                } catch (e) {
                    console.error('خطأ في تحميل البيانات المحفوظة');
                    // رجوع للتحميل العادي
                    const oldData = localStorage.getItem('assetsDataOld');
                    if (oldData) assetsData = JSON.parse(oldData);
                }
            }
        }

        // ==================== تبديل اللغة ====================

        document.querySelectorAll('.lang-option').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.lang-option').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                switchLanguage(this.dataset.lang);
                currentFilters.lang = currentLang;
                saveAppState();
            });
        });

        // ==================== بدء التطبيق ====================
        initializeData();
        // loadFromLocalStorage(); // تم استبداله بـ loadAppState في initializeData
        updateLastUpdate();
        
        // حفظ البيانات عند إغلاق الصفحة
        window.addEventListener('beforeunload', function() {
            saveToLocalStorage();
        });
    </script>
</body>
</html>
